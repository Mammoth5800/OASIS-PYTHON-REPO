<!DOCTYPE html>
<html>
<head>
<title>BMI Calculator</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.card{
background:white;
padding:30px;
width:320px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
padding:10px;
width:80%;
margin:8px;
}

button{
padding:10px;
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
color:blue;
}

</style>

</head>

<body>

<div class="card">

<h2>BMI Calculator</h2>

<form method="POST">

<input type="number" step="any" name="weight" placeholder="Weight (kg)" required>
<br>

<input type="number" step="any" name="height" placeholder="Height (meters)" required>
<br>

<button type="submit">Calculate BMI</button>

</form>

{% if bmi %}
<div class="result">
<p>BMI: {{ bmi }}</p>
<p>Category: {{ category }}</p>
</div>
{% endif %}

</div>

</body>
</html>
